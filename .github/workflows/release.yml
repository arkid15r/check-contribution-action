name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - 3.14

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pipx and Poetry
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          pipx install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run pre-commit
        run: poetry run pre-commit run --all-files

      - name: Lint with ruff
        run: poetry run ruff check .

      - name: Format check with ruff
        run: poetry run ruff format --check .

      - name: Test with pytest
        run: poetry run pytest --cov=src --cov-fail-under=90

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify action.yml references this release's Docker tag
        run: |
          grep -Eq "check-contribution-action/check-contribution-action:${GITHUB_REF_NAME}\$" action.yml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker tags
        id: tags
        run: |
          image="ghcr.io/${{ github.repository }}/check-contribution-action"
          version="${GITHUB_REF_NAME}"
          major="${version%%.*}"
          {
            echo "list<<EOF"
            echo "${image}:${version}"
            echo "${image}:${major}"
            echo "${image}:${{ github.sha }}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/check-contribution-action:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/check-contribution-action:cache,mode=max
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}

      - name: Verify multi-arch manifest
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}/check-contribution-action:${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" \
            || gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
