name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - 3.14

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pipx and Poetry
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          pipx install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run pre-commit
        run: poetry run pre-commit run --all-files

      - name: Lint with ruff
        run: poetry run ruff check .

      - name: Format check with ruff
        run: poetry run ruff format --check .

      - name: Test with pytest
        run: poetry run pytest --cov=src --cov-fail-under=90

  build-image:
    name: Build ${{ matrix.platform }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache_id: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_id: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify action.yml references this release's Docker tag
        if: matrix.platform == 'linux/amd64'
        run: |
          grep -Eq "check-contribution-action/check-contribution-action:${GITHUB_REF_NAME}\$" action.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/check-contribution-action:cache-${{ matrix.cache_id }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/check-contribution-action:cache-${{ matrix.cache_id }},mode=max
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.platform }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Download digests
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        env:
          IMAGE: ghcr.io/${{ github.repository }}/check-contribution-action
        run: |
          version="${GITHUB_REF_NAME}"
          major="${version%%.*}"
          refs=()
          for file in "${{ runner.temp }}/digests"/*; do
            refs+=("${IMAGE}@sha256:$(basename "${file}")")
          done
          docker buildx imagetools create \
            -t "${IMAGE}:${version}" \
            -t "${IMAGE}:${major}" \
            -t "${IMAGE}:${{ github.sha }}" \
            "${refs[@]}"

      - name: Verify multi-arch manifest
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}/check-contribution-action:${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" \
            || gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
