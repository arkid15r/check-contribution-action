name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/integration-tests.yml
      - .github/scripts/integration/**
      - src/**
      - action.yml
      - Dockerfile
      - entrypoint.sh
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/integration-tests.yml
      - .github/scripts/integration/**
      - src/**
      - action.yml
      - Dockerfile
      - entrypoint.sh

concurrency:
  cancel-in-progress: false
  group: integration-tests-${{ github.repository }}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: integration-build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build action Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          tags: check-contribution-action:integration-test
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save check-contribution-action:integration-test | gzip > integration-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: integration-docker-image
          path: integration-image.tar.gz
          retention-days: 1

  integration:
    name: integration-${{ matrix.case }}
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      INTEGRATION_SKIP_DOCKER_BUILD: "true"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.fork == false
    strategy:
      fail-fast: false
      matrix:
        case:
          - commit-sign-off-fail
          - commit-sign-off-pass
          - commit-signature-fail
          - issue-assignee-fail
          - issue-linked-fail
          - issue-linked-pass
          - issue-reference-fail
          - issue-reference-pass
          - target-branch-fail
          - target-branch-pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download Docker image
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: integration-docker-image

      - name: Load Docker image
        run: gunzip -c integration-image.tar.gz | docker load

      - name: Run integration case
        env:
          CASE_ID: ${{ matrix.case }}
        run: bash .github/scripts/integration/run_case.sh "${{ matrix.case }}"

  cleanup:
    name: integration-cleanup
    runs-on: ubuntu-latest
    needs: integration
    if: always()
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Remove integration test artifacts
        run: bash .github/scripts/integration/cleanup_run.sh "${{ github.run_id }}"
