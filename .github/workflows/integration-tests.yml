name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/integration-tests.yml
      - .github/scripts/integration/**
      - src/**
      - action.yml
      - Dockerfile
      - entrypoint.sh
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/integration-tests.yml
      - .github/scripts/integration/**
      - src/**
      - action.yml
      - Dockerfile
      - entrypoint.sh

concurrency:
  cancel-in-progress: false
  group: integration-tests-${{ github.repository }}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: integration-build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build action Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          tags: check-contribution-action:integration-test
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save check-contribution-action:integration-test | gzip > integration-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-docker-image
          path: integration-image.tar.gz
          retention-days: 1

  integration:
    name: integration-${{ matrix.case }}
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      INTEGRATION_SKIP_DOCKER_BUILD: "true"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.fork == false
    strategy:
      fail-fast: false
      matrix:
        case:
          - commit-sign-off-fail
          - commit-sign-off-pass
          - commit-signature-fail
          - issue-assignee-fail
          - issue-linked-fail
          - issue-linked-pass
          - issue-reference-fail
          - issue-reference-pass
          - target-branch-fail
          - target-branch-pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download Docker image
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: integration-docker-image

      - name: Load Docker image
        run: gunzip -c integration-image.tar.gz | docker load

      - name: Run integration case
        env:
          CASE_ID: ${{ matrix.case }}
        run: bash .github/scripts/integration/run_case.sh "${{ matrix.case }}"

  cleanup:
    name: integration-cleanup
    runs-on: ubuntu-latest
    needs: integration
    if: always()
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Remove integration test artifacts
        run: bash .github/scripts/integration/cleanup_run.sh "${{ github.run_id }}"
