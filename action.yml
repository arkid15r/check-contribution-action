name: Check Contribution Action
description: Validates contribution requirements including issue linkage, commit signatures, and sign-off
author: arkid15r
branding:
  icon: check-circle
  color: green

inputs:
  check_for:
    description: >-
      Comma-separated contribution checks to enable. Supported values:
      commit_sign_off, commit_signature, issue_assignee, issue_reference, target_branch
    required: true
  close_on:
    description: >-
      Comma-separated validation failures that close the PR. Supported values:
      commit_sign_off, commit_signature, issue_assignee, issue_reference, target_branch
    required: false
    default: ''
  error_commit_sign_off:
    description: Error message when commit_sign_off check fails
    required: false
    default: One or more commits are missing or have an invalid Signed-off-by trailer.
  error_commit_signature:
    description: Error message when commit_signature check fails
    required: false
    default: One or more commits are not signed.
  error_issue_assignee:
    description: Error message when issue_assignee check fails
    required: false
    default: The linked issue must be assigned to the PR author before this PR can be merged.
  error_issue_reference:
    description: >-
      Error message when issue_reference check fails (no linked issue or valid
      closing reference in the PR description)
    required: false
    default: >-
      This PR must be linked to an issue or include a valid closing issue
      reference in the description.
  error_target_branch:
    description: Error message when target_branch check fails
    required: false
    default: This PR must target one of the allowed branches.
  github_token:
    description: GitHub token for API access
    required: true
  sign_off_strict_match:
    description: Whether Signed-off-by must match the commit author identity
    required: false
    default: 'false'
  skip_users:
    description: Comma-separated list of usernames to skip validation
    required: false
    default: ''
  skip_users_file_path:
    description: Path to a file containing usernames to skip validation (one username per line)
    required: false
    default: ''
  target_branches:
    description: Newline-separated list of target branches to validate against (repository default branch is automatically included)
    required: false
    default: ''
  validate_bot_authors:
    description: Whether to validate PRs authored by bots instead of skipping them
    required: false
    default: 'false'

runs:
  using: docker
  image: docker://ghcr.io/arkid15r/check-contribution-action/check-contribution-action:v0.1.3
